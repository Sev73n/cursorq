name: Build CursorQ Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    # 使用 Docker 容器运行（oc-docker-runner 支持）
    runs-on: docker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/tauri/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build:core

      - name: Show environment info
        run: |
          node --version
          npm --version
          rustc --version
          cargo --version

      - name: Build Tauri app
        run: cd apps/tauri && npx tauri build
        env:
          RUST_BACKTRACE: full
          CARGO_TERM_COLOR: never

      - name: List build outputs
        if: always()
        run: |
          echo "=== Bundle directory ==="
          ls -la apps/tauri/src-tauri/target/release/bundle/ 2>/dev/null || echo "Bundle directory not found"
          echo "=== Release exe ==="
          ls -la apps/tauri/src-tauri/target/release/*.exe 2>/dev/null || echo "No exe found"
          echo "=== dist directory ==="
          ls -la apps/tauri/dist 2>/dev/null || echo "dist directory not found"

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="0.1.1"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Prepare release package
        if: success()
        run: |
          version="${{ steps.get_version.outputs.VERSION }}"
          releaseDir="release"
          packageName="cursorq-${version}-win64"

          mkdir -p "$releaseDir"

          # Copy Tauri build output
          bundlePath="apps/tauri/src-tauri/target/release/bundle"
          if [ -d "$bundlePath/msi" ]; then
            cp "$bundlePath/msi/"* "$releaseDir/"
          fi
          if [ -d "$bundlePath/nsis" ]; then
            cp "$bundlePath/nsis/"* "$releaseDir/"
          fi

          # Find exe
          exePath="apps/tauri/src-tauri/target/release/CursorQ.exe"
          if [ ! -f "$exePath" ]; then
            exePath=$(ls apps/tauri/src-tauri/target/release/*.exe 2>/dev/null | head -1)
          fi

          if [ -f "$exePath" ]; then
            # Create package directory
            packageDir="${releaseDir}/${packageName}"
            mkdir -p "$packageDir"
            cp "$exePath" "$packageDir/"
            cp -r apps/tauri/dist "$packageDir/"
            cp -r content "$packageDir/" 2>/dev/null || true
            cp -r data "$packageDir/" 2>/dev/null || true
            cp -r config "$packageDir/" 2>/dev/null || true
            cp release/README.md "$packageDir/" 2>/dev/null || true
            cp LICENSE "$packageDir/" 2>/dev/null || true

            # Create zip
            cd "$releaseDir"
            zip -r "${packageName}.zip" "$packageName"
            cd ..
            echo "Created: ${releaseDir}/${packageName}.zip"
            ls -la "$releaseDir/"
          else
            echo "Executable not found"
            exit 1
          fi

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cursorq-windows-${{ steps.get_version.outputs.VERSION }}
          path: release/*.zip
          if-no-files-found: error

      - name: Create Release
        if: success() && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.zip
            release/*.msi
            release/*.exe
          body: |
            # CursorQ ${{ steps.get_version.outputs.VERSION }}

            ## 下载

            - **cursorq-${{ steps.get_version.outputs.VERSION }}-win64.zip** - 便携版（推荐）
            - **CursorQ_${{ steps.get_version.outputs.VERSION }}_x64_en-US.msi** - MSI 安装包

            ## 使用说明

            1. 下载并解压 zip 文件到任意目录
            2. 双击 `CursorQ.exe` 启动
            3. 首次启动会自动读取 Cursor 用量信息

            ## 系统要求

            - Windows 10/11 (64-bit)
            - Node.js 20+
            - 已安装并登录 Cursor 桌面版

            ## 更新日志

            - 新增大型数据库支持
            - 新增卡片式 UI 布局
            - 修复安全漏洞
            - 优化构建流程
          draft: false
          prerelease: false
          generate_release_notes: true
