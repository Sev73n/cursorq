name: Build CursorQ

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    # 使用 Gitea 默认的 docker runner 标签
    # 如果 runner 没有 docker 标签，尝试以下选项：
    # - ubuntu-latest
    # - self-hosted
    # - 或者查看 runner 实际配置的标签
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build:core

      - name: Build frontend
        run: cd apps/tauri && npm run vite:build

      - name: Show build outputs
        run: |
          echo "=== dist directory ==="
          ls -la apps/tauri/dist/ 2>/dev/null || echo "dist not found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cursorq-build
          path: |
            apps/tauri/dist/**
            packages/core/dist/**
