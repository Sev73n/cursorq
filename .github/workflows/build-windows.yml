name: Build CursorQ Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/tauri/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Install sqlite3
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path C:\platform-tools | Out-Null
          $zip = "$env:RUNNER_TEMP\sqlite-tools.zip"
          Invoke-WebRequest -Uri "https://www.sqlite.org/2024/sqlite-tools-win-x64-3460100.zip" -OutFile $zip
          Expand-Archive $zip -DestinationPath "$env:RUNNER_TEMP\sqlite" -Force
          $exe = Get-ChildItem "$env:RUNNER_TEMP\sqlite" -Recurse -Filter sqlite3.exe | Select-Object -First 1
          if (-not $exe) { throw "sqlite3.exe not found in downloaded archive" }
          Copy-Item $exe.FullName C:\platform-tools\sqlite3.exe -Force
          Write-Host "Installed sqlite3 at C:\platform-tools\sqlite3.exe"

      - name: Get version
        id: get_version
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Package portable zip
        shell: pwsh
        run: npm run package:win
        env:
          CURSORQ_SQLITE3: C:\platform-tools\sqlite3.exe

      - name: Show package output
        shell: pwsh
        run: |
          Get-ChildItem release\cursorq-*.zip | Format-Table Name, Length -AutoSize
          $zip = Get-ChildItem release\cursorq-*.zip | Select-Object -First 1
          if ($zip.Length -lt 20000000) {
            Write-Warning "Package seems too small ($($zip.Length) bytes); expected full portable bundle"
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cursorq-windows-${{ steps.get_version.outputs.VERSION }}
          path: release/cursorq-*.zip
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/cursorq-*.zip
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          generate_release_notes: false
