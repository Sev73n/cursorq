<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:"
    />
    <link rel="stylesheet" href="capsule.css" />
  </head>
  <body>
    <div class="shell" id="shell">
      <div class="pill" id="pill">
        <div class="pill-bar" id="barTrack" aria-hidden="true"></div>
        <div class="pill-row">
          <div class="drag-handle" title="拖动"></div>
          <div class="mascot-wrap">
            <img
              src="../assets/mascot/default.svg"
              alt=""
              width="36"
              height="36"
            />
          </div>
          <div class="copy">
            <div class="line" id="line1">连接中</div>
            <div class="line" id="line2">…</div>
          </div>
          <button type="button" class="btn-toggle" id="btnToggle" aria-label="展开详情">
            ▾
          </button>
        </div>
      </div>
      <div class="panel" id="panel">
        <div class="panel-inner">
          <h3 class="panel-title" id="titleIncluded">Included Usage</h3>
          <p class="cycle" id="cycleRange">—</p>
          <div class="stats" id="stats"></div>
          <table class="usage-table">
            <thead>
              <tr>
                <th id="thItem">Item</th>
                <th id="thTokens">Tokens</th>
                <th id="thUsage">Usage</th>
              </tr>
            </thead>
            <tbody id="usageBody"></tbody>
          </table>
          <p class="hint" id="hint"></p>
        </div>
      </div>
    </div>
    <script src="capsule.js"></script>
  </body>
</html>
